<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Arte - Cuadros Personalizados</title>
    <meta name="description" content="Descubre nuestra colección de cuadros personalizados. Arte único para tu hogar.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Popup Inicial -->
    <div id="welcome-popup" class="popup-overlay">
        <div class="popup-content">
            <div class="popup-image-container">
                <img src="tanjiro.jpeg" alt="Bienvenida Tanjiro" id="popup-img">
                <div class="popup-overlay-text">
                    <h2>¿Listo para ver el catálogo?</h2>
                    <button id="start-btn" class="glow-on-hover">HAZ CLICK AQUÍ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Contenido Principal (Oculto al inicio) -->
    <div id="main-content" class="hidden">
        <header>
            <h1 class="logo">CUADROS<span>ARTE</span></h1>
        </header>

        <main>
            <!-- Sección de la Revista/Catálogo -->
            <section id="catalog-section">
                <div class="magazine-container">
                    <div id="magazine" class="magazine">
                        <!-- Las páginas se cargarán por JS -->
                    </div>
                </div>
                <div class="magazine-controls">
                    <button id="prev-btn" class="control-btn" title="Anterior"><i class="fas fa-chevron-left"></i></button>
                    <span id="page-indicator">Página 1 de 6</span>
                    <button id="next-btn" class="control-btn" title="Siguiente"><i class="fas fa-chevron-right"></i></button>
                    <button id="fullscreen-btn" class="control-btn" title="Pantalla Completa"><i class="fas fa-expand"></i></button>
                </div>
            </section>

            <!-- Sección de Galería -->
            <section id="gallery-section">
                <h2 class="section-title">Galería de Exposición</h2>
                <div class="gallery-grid" id="gallery-grid">
                    <!-- Imágenes se cargan vía JS -->
                </div>
            </section>
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; 2024 Cuadros Arte | Síguenos para más contenido</p>
                <div class="social-links">
                    <a href="https://www.instagram.com/alehna_ec?igsh=MWp3NGs3YjB4dnVwOQ==" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@alephhhhhhhhhhhh?_r=1&_t=ZS-94xqCKTynSP" target="_blank"><i class="fab fa-tiktok"></i></a>
                    <i class="fab fa-facebook"></i>
                </div>
            </div>
        </footer>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox-overlay hidden">
        <span class="close-lightbox">&times;</span>
        <div class="lightbox-content-wrapper">
            <img class="lightbox-img" src="" alt="Vista ampliada">
            <a id="order-button" href="#" target="_blank" class="glow-on-hover order-now-btn">
                ENCARGAR AHORA <i class="fab fa-whatsapp"></i>
            </a>
        </div>
    </div>

    <!-- Botón WhatsApp Retro -->
    <a href="https://wa.me/584144504581?text=un%20saludo%20quiero%20encargar%20un%20cuadro" 
       class="whatsapp-float retro-btn" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-whatsapp"></i>
        <span class="retro-tooltip">¡Encarga el tuyo!</span>
    </a>

    <!-- Page Flip Library -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
